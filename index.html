<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Orange</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><div class="logo">🍊</div><div><h1>Project Orange</h1><p>Syracuse OBX Value Index</p></div></div>
    <button class="nav active" data-view="dashboard">Today's Decision</button>
    <button class="nav" data-view="houses">Houses</button>
    <button class="nav" data-view="votes">Group Picks</button>
    <button class="nav" data-view="market">Market</button>
    <button class="nav" data-view="history">History</button>
    <div class="sidebar-note"><b>Data:</b><br><span id="dataStatus">Loading…</span></div>
  </aside>
  <main>
    <header class="topbar">
      <div><h2 id="pageTitle">Today's Decision</h2><p id="pageSubtitle">Live ranking, votes, prices, and market notes.</p></div>
      <div class="actions"><button id="refreshBtn">Refresh</button><button id="addHouseBtn" class="primary">+ Add House</button></div>
    </header>
    <section id="dashboard" class="view active"></section>
    <section id="houses" class="view"></section>
    <section id="votes" class="view"></section>
    <section id="market" class="view"></section>
    <section id="history" class="view"></section>
  </main>

  <div id="modal" class="modal hidden"><div class="modal-card"><button class="close" id="closeModal">×</button><div id="modalContent"></div></div></div>
  <div id="toast" class="toast hidden"></div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
